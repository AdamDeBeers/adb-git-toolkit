name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y bats

      - name: Run bats tests
        run: bats tests/
