# ADB Git Toolkit - Moonraker Update Manager entry
#
# Registers ADB Git Toolkit with Moonraker's update_manager so it shows
# up in Mainsail under Machine > Update Manager, with version/commit
# status and an Update button.
#
# Requires the toolkit to be installed with install.sh, which clones it
# into ~/.local/share/adb-git-toolkit (a real Git checkout, so Moonraker
# can track and fast-forward it like any other git_repo client).
#
# Usage: add the following line to moonraker.conf, then copy this file
# next to it (e.g. ~/printer_data/config/moonraker-update.cfg):
#
#   [include moonraker-update.cfg]
#
# Or paste the section below directly into moonraker.conf.

[update_manager adb-git-toolkit]
type: git_repo
path: ~/.local/share/adb-git-toolkit
origin: https://github.com/AdamDeBeers/adb-git-toolkit.git
primary_branch: main
managed_services:
install_script: install.sh
